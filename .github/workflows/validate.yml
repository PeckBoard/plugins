name: Validate registry

on:
  push:
    branches: [main]
  pull_request:

jobs:
  structure:
    name: Structure + schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Stdlib-only structural checks — the load-bearing gate.
      - name: Validate structure
        run: python scripts/validate.py
      # Belt-and-braces: also validate against the JSON Schema.
      - name: Validate against JSON Schema
        run: |
          python -m pip install --quiet jsonschema
          python - <<'PY'
          import json, sys
          from jsonschema import Draft202012Validator
          schema = json.load(open("schema/registry.schema.json"))
          data = json.load(open("registry.json"))
          errs = sorted(Draft202012Validator(schema).iter_errors(data), key=lambda e: e.path)
          for e in errs:
              loc = "/".join(str(p) for p in e.path)
              print(f"  - {loc or '<root>'}: {e.message}", file=sys.stderr)
          sys.exit(1 if errs else 0)
          PY

  checksums:
    name: Verify checksums
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Downloads each .wasm and confirms its SHA-256 matches the index.
      - name: Verify checksums
        run: python scripts/validate.py --verify-checksums
